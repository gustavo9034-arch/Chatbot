<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathBot 🧮 — Seu Amigo da Matemática</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #25d366;
      --green-dark: #1ebe5d;
      --green-light:#d4ffd4;
      --bg-page:    #111b21;
      --bg-chat:    #0b141a;
      --bubble-bot: #202c33;
      --bubble-user:#005c4b;
      --text-main:  #e9edef;
      --text-sub:   #8696a0;
      --input-bg:   #2a3942;
      --header-bg:  #202c33;
    }

    body {
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Nunito', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(37,211,102,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(37,211,102,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      height: 88vh;
      max-height: 700px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    }

    #header {
      background: var(--header-bg);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    #avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00e676, #1de9b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(37,211,102,0.35);
    }

    #header-info { flex: 1; }
    #header-name {
      font-size: 16px; font-weight: 800;
      color: var(--text-main);
      letter-spacing: 0.2px;
    }
    #header-status {
      font-size: 12px;
      color: var(--green);
      margin-top: 1px;
      font-weight: 600;
    }

    #header-icons { font-size: 20px; display: flex; gap: 14px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg-chat);
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='6' y='24' font-size='18' opacity='0.035' fill='%2325d366'%3E%2B%3C/text%3E%3Ctext x='46' y='56' font-size='16' opacity='0.03' fill='%2325d366'%3E%C3%97%3C/text%3E%3Ctext x='14' y='66' font-size='14' opacity='0.025' fill='%2325d366'%3E%3D%3C/text%3E%3Ctext x='58' y='22' font-size='16' opacity='0.03' fill='%2325d366'%3E%C3%B7%3C/text%3E%3C/svg%3E");
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.bot  { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.55;
      position: relative;
      word-break: break-word;
      color: var(--text-main);
    }

    .bubble.user {
      background: var(--bubble-user);
      border-bottom-right-radius: 5px;
    }
    .bubble.bot {
      background: var(--bubble-bot);
      border-bottom-left-radius: 5px;
    }

    .bubble .time {
      font-size: 10px;
      color: var(--text-sub);
      text-align: right;
      margin-top: 5px;
    }

    .result-big {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: var(--green);
      margin: 4px 0 2px;
      text-shadow: 0 0 20px rgba(37,211,102,0.4);
    }

    .expr-text {
      font-size: 13px;
      color: var(--text-sub);
      display: block;
    }

    .encouragement {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    .typing-wrap { align-items: flex-start; }
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
      background: var(--bubble-bot);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
    }
    .typing span {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: bounce 1.1s infinite;
      opacity: 0.8;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.8; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    .chip-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }
    .chip {
      background: rgba(37,211,102,0.12);
      border: 1.5px solid rgba(37,211,102,0.35);
      color: var(--green);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s, transform 0.1s;
    }
    .chip:hover { background: rgba(37,211,102,0.22); transform: scale(1.04); }
    .chip:active { transform: scale(0.97); }
    
    .date-sep {
      text-align: center;
      font-size: 11.5px;
      color: var(--text-sub);
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 4px 12px;
      align-self: center;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #input-area {
      background: var(--header-bg);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      border: none;
      border-radius: 24px;
      padding: 11px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      outline: none;
      background: var(--input-bg);
      color: var(--text-main);
      transition: box-shadow 0.2s;
    }
    #msg-input::placeholder { color: var(--text-sub); }
    #msg-input:focus { box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(37,211,102,0.3);
    }
    #send-btn:hover { background: var(--green-dark); box-shadow: 0 4px 20px rgba(37,211,102,0.5); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    #page-title {
      position: fixed;
      top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="page-title">MathBot — Plataforma Matemática Infantil</div>

<div id="app">
  <div id="header">
    <div id="avatar">🤖</div>
    <div id="header-info">
      <div id="header-name">MathBot 🧮</div>
      <div id="header-status">● online agora</div>
    </div>
    <div id="header-icons">📐🔢</div>
  </div>

  <div id="messages">
    <div class="date-sep">HOJE</div>
  </div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Ex: 50+10, 8×7, 100÷4…" autocomplete="off" />
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const msgsEl  = document.getElementById('messages');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  function now() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
  }

  function addMsg(content, side, isHtml = false) {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${side}`;

    const b = document.createElement('div');
    b.className = `bubble ${side}`;
    if (isHtml) b.innerHTML = content;
    else b.textContent = content;

    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = now();
    b.appendChild(t);

    wrap.appendChild(b);
    msgsEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap typing-wrap';
    wrap.id = 'typing-ind';
    wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    msgsEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-ind');
    if (t) t.remove();
  }

  function calcExpr(raw) {
    let e = raw
      .replace(/[×✕xX]/g, '*')
      .replace(/[÷:]/g, '/')
      .replace(/[^0-9+\-*/.()%\s]/g, '')
      .trim();

    if (!e || !/[0-9]/.test(e)) return null;
    try {
      // eslint-disable-next-line no-new-func
      const r = Function('"use strict"; return (' + e + ')')();
      if (typeof r !== 'number' || !isFinite(r)) return null;
      return { display: e.replace(/\*/g,'×').replace(/\//g,'÷'), result: Math.round(r * 10000) / 10000 };
    } catch (_) { return null; }
  }

  const encouragements = [
    'Muito bem! Você arraasa! 💪',
    'Uau, conta resolvida na hora! 🌟',
    'Você é um gênio da matemática! 🧠',
    'Continue assim, você é incrível! 🚀',
    'Perfeito! Nada te para! 🏆',
    'Show de bola! Manda mais! 🎯',
    'Isso aí! Matemática é com você! 🎉',
  ];
  const emojis = ['🎉','⭐','🌟','🎯','🏆','🚀','💡','🎊','✨','🦄','🍭','🎈','🥳','🔥'];

  function randOf(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function emojiFor(n) {
    if (n < 0)     return '😮';
    if (n === 0)   return '🤔';
    if (n > 1000)  return '🤯';
    return randOf(emojis);
  }

  function intent(text) {
    const t = text.toLowerCase();
    if (/ol[aá]|oi\b|e[ií]\b|hey|bom dia|boa tarde|boa noite/.test(t)) return 'greeting';
    if (/obrigad|valeu|vlw|graças/.test(t)) return 'thanks';
    if (/ajuda|como usar|o que (você|vc)|pode fazer|comandos|opções/.test(t)) return 'help';
    return 'calc';
  }

  const replies = {
    greeting: () => `Olá! 👋😄<br>Eu sou o <b>MathBot</b>, seu parceiro de matemática!<br><br>
      Me manda qualquer conta que eu resolvo na hora. Experimente:
      <div class="chip-row">
        <span class="chip" onclick="quickSend('25+37')">25+37</span>
        <span class="chip" onclick="quickSend('8×9')">8×9</span>
        <span class="chip" onclick="quickSend('100÷4')">100÷4</span>
        <span class="chip" onclick="quickSend('(10+5)×3')">(10+5)×3</span>
      </div>`,

    thanks: () => 'De nada! 😄 Manda mais contas, adoro resolver! 🧮✨',

    help: () => `É super fácil! 🎉<br><br>
      <span class="expr-text">➕ Soma &nbsp;&nbsp;&nbsp;→ <b>30+15</b></span><br>
      <span class="expr-text">➖ Subtração → <b>50−23</b></span><br>
      <span class="expr-text">✖️ Multiplicação → <b>6×7</b> ou <b>6*7</b></span><br>
      <span class="expr-text">➗ Divisão → <b>80÷4</b> ou <b>80/4</b></span><br>
      <span class="expr-text">🔢 Mistas → <b>(5+3)×2</b></span><br><br>
      Pode mandar do jeito que quiser — eu entendo! 😎`,

    calc: (text) => {
      const c = calcExpr(text);
      if (c) {
        const emoji = emojiFor(c.result);
        const enc   = randOf(encouragements);
        return `<span class="expr-text">${emoji} &nbsp;${c.display} =</span>
                <span class="result-big">${c.result}</span>
                <span class="encouragement">${enc}</span>`;
      }
      const examples = ['25+13','7×8','(10+5)×3','200÷4','99−47','12²'.replace('²','^2')];
      return `Hmm, não entendi essa 🤔<br>
        Tenta mandar uma conta, tipo: <b>${randOf(examples)}</b><br><br>
        Pode usar: <b>+  −  ×  ÷  ( )</b>
        <div class="chip-row">
          <span class="chip" onclick="quickSend('50+10')">50+10</span>
          <span class="chip" onclick="quickSend('9×6')">9×6</span>
          <span class="chip" onclick="quickSend('144÷12')">144÷12</span>
        </div>`;
    },
  };
  
  function botReply(userText) {
    showTyping();
    const delay = 700 + Math.random() * 500;
    setTimeout(() => {
      removeTyping();
      const type = intent(userText);
      const html = type === 'calc' ? replies.calc(userText) : replies[type]();
      addMsg(html, 'bot', true);
    }, delay);
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMsg(text, 'user', false);
    inputEl.value = '';
    inputEl.focus();
    botReply(text);
  }

  window.quickSend = function(text) {
    inputEl.value = text;
    send();
  };

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  
  setTimeout(() => {
    addMsg(
      `Oi! Eu sou o <b>MathBot</b> 🤖🧮<br>Me manda qualquer conta de matemática e eu resolvo!
      <div class="chip-row">
        <span class="chip" onclick="quickSend('50+10')">50+10</span>
        <span class="chip" onclick="quickSend('9×7')">9×7</span>
        <span class="chip" onclick="quickSend('(8+2)×5')">(8+2)×5</span>
        <span class="chip" onclick="quickSend('ajuda')">Ajuda 🙋</span>
      </div>`,
      'bot', true
    );
  }, 400);
</script>
</body>
</html>
